<!DOCTYPE html>
<head>
    <title>Sample Form</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form>
        <!-- Password Input Field -->
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required title="Password must be at least 6 characters long"><br><br>

        <!-- Number Input Field -->
        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" placeholder="Enter your age" required title="Please enter your age in years"><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
