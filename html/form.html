<br>

<input type ="time" id="mobile" name="mobile number" placeholder="Enter Mobile number here" title="Enter in 30 seconds" required="">


<br> <br>

<input type ="datetime-local" id="mobile" name="date and time together" placeholder="Enter Mobile number here" title="Enter in 30 seconds" required="">
